when:
  - event: ["push", "pull_request"]
    branch: main

engine: nixery

dependencies:
  nixpkgs:
    - go
    - gcc
    - ripgrep
    - jq

environment:
  GOTOOLCHAIN: "go1.26.4"

steps:
  - name: Lint code
    command: |
      go vet -v ./...
  - name: Run tests
    command: |
      go test ./... -rapid.checks=10_000 -v -race -cover 
  - name: Run fuzz
    command: |
      values=$(rg "Fuzz\w+" --json | jq -r 'if .type | . != "match" then empty end | .data | (.path.text | split("/")[:-1] | join("/")) + "/" + .submatches[0].match.text')
      for v in $values; do
        file=$(basename $v)
        go test ./$(dirname $v) -v -fuzztime=1m -fuzz $file -run $file
      done
