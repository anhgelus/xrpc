when:
  - event: ["push", "pull_request"]
    branch: main

engine: nixery

dependencies:
  nixpkgs:
    - go
    - gcc
    - ripgrep
    - jq

steps:
  - name: Lint code
    command: |
      go vet -v ./...
  - name: Run tests
    command: |
      go test -rapid.checks=10_000 -v -race -cover ./...
      res=$?
      if [ $res -ne 0 ]; then cat "**/testdata/**.fail"; exit $res; fi
  - name: Run fuzz
    command: |
      values=$(rg "Fuzz\w+" --json | jq -r 'if .type | . != "match" then empty end | .data | (.path.text | split("/")[:-1] | join("/")) + "/" + .submatches[0].match.text')
      for v in $values; do
        file=$(basename $v)
        go test ./$(dirname $v) -v -fuzztime=1m -fuzz $file -run $file
        res=$?
        if [ $res -ne 0 ]; then cat "**/testdata/**.fail"; exit $res; fi
      done
